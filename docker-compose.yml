services:
  server:
    build: ./apps/server
    ports:
      - "8080:8080"
    env_file:
      - ./apps/server/.env
    environment:
      - CORS_ORIGIN=http://localhost:3000

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
    depends_on:
      - server
